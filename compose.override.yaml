# Multirepo overrides — merged on top of repos/shopware/compose.yaml.
# Add extension repos from ./extensions/* as Shopware plugin mounts.
#
# Run from repo root:
#   docker compose -f repos/shopware/compose.yaml -f compose.override.yaml up -d

services:
  web:
    environment:
      SHOPWARE_HTTP_CACHE_ENABLED: "1"
      SHOPWARE_HTTP_DEFAULT_TTL: "7200"
    volumes:
      - ../../extensions/AutoresearchPerf:/var/www/html/custom/plugins/AutoresearchPerf

  opensearch:
    environment:
      OPENSEARCH_JAVA_OPTS: "-Xms768m -Xmx768m"
